<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmojiSequencer</title>
<meta name="description" content="Translate any sentence into emojis">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EmojiSequencer">
<script>
const manifest = {
  name: "EmojiSequencer",
  short_name: "EmojiSequencer",
  description: "Translate any sentence into emojis",
  start_url: ".",
  display: "standalone",
  background_color: "#1a1a2e",
  theme_color: "#1a1a2e"
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#242438;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --text:#f0f0f5;--text2:#a0a0b8;--text3:#6a6a88;
  --accent:#9b59b6;--accent2:#7d3c98;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
header{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;border-bottom:0.5px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
header h1{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.tabs{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 12px}
.tab{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.pane{display:none;padding:16px;max-width:680px;margin:0 auto}
.pane.active{display:block}
input[type="text"]{flex:1;padding:10px 14px;font-size:15px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);outline:none;-webkit-appearance:none;width:100%}
input[type="text"]:focus{border-color:var(--accent)}
input[type="text"]::placeholder{color:var(--text3)}
.input-row{display:flex;gap:8px;margin-bottom:14px}
.btn{padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;border:none;border-radius:var(--radius-sm);background:var(--accent);color:white;white-space:nowrap;transition:background 0.15s}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border);font-weight:500}
.btn-ghost:hover{background:var(--border)}
.btn-ghost.active{color:var(--accent);border-color:var(--accent)}
.result-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.emoji-string{font-size:30px;letter-spacing:3px;line-height:1.5;display:block;cursor:pointer;padding:4px 0 12px;min-height:50px}
.action-row{display:flex;gap:8px;padding-top:10px;border-top:0.5px solid var(--border);margin-top:4px}
.word-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border)}
.word-block{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px}
.word-label{font-size:11px;color:var(--text3);margin-bottom:6px}
.emoji-opts{display:flex;gap:4px;flex-wrap:wrap}
.emoji-opt{font-size:22px;cursor:pointer;border:1.5px solid transparent;border-radius:6px;padding:2px 5px;background:transparent;line-height:1.3;transition:border-color 0.1s}
.emoji-opt.selected{border-color:var(--accent);background:rgba(155,89,182,0.15)}
.fav-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;cursor:pointer}
.fav-sentence{font-size:12px;color:var(--text3);margin-bottom:6px}
.fav-emoji{font-size:24px;letter-spacing:2px}
.fav-item-actions{display:flex;justify-content:flex-end;margin-top:8px}
.pref-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:14px}
.pref-word{color:var(--text2)}
.pref-emoji{font-size:22px}
.del-btn{font-size:12px;padding:3px 9px;background:transparent;border:0.5px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:2.5rem 0;line-height:1.7}
.error{color:#e74c3c;font-size:14px;margin-bottom:10px;padding:8px;background:rgba(231,76,60,0.1);border-radius:var(--radius-sm)}
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:white;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:500;transition:transform 0.25s ease;pointer-events:none;z-index:100}
.toast.show{transform:translateX(-50%) translateY(0)}
.pref-note{font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.6}
</style>
</head>
<body>

<header>
  <span style="font-size:28px;line-height:1">📖</span>
  <h1>EmojiSequencer</h1>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('translate',this)">Translate</button>
  <button class="tab" onclick="switchTab('favourites',this)">Favourites</button>
  <button class="tab" onclick="switchTab('preferences',this)">Emoji prefs</button>
</div>

<div id="pane-translate" class="pane active">
  <div class="input-row">
    <input type="text" id="sentence-input" placeholder="Type a sentence..." onkeydown="if(event.key==='Enter')runTranslate()">
    <button class="btn" id="translate-btn" onclick="runTranslate()">Go</button>
  </div>
  <div id="error" class="error" style="display:none"></div>
  <div id="result" style="display:none">
    <div class="result-box">
      <span class="emoji-string" id="emoji-output" onclick="copyMain()" title="Tap to copy"></span>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyMain()">Copy</button>
        <button class="btn btn-ghost" id="fav-btn" onclick="toggleFavSentence()">☆ Save</button>
      </div>
    </div>
    <div class="word-grid" id="word-grid"></div>
  </div>
</div>

<div id="pane-favourites" class="pane">
  <div id="fav-list"></div>
</div>

<div id="pane-preferences" class="pane">
  <p class="pref-note">Your preferred emoji per word. Applied automatically next time that word appears.</p>
  <div id="pref-list"></div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const SYSTEM = `You are an emoji translator. Given a sentence, translate it into emojis word by word or concept by concept.

Return ONLY valid JSON. No markdown, no backticks, no preamble.

Format:
{
  "translation": [
    {
      "word": "the source word or concept",
      "options": ["emoji1", "emoji2", "emoji3"]
    }
  ]
}

Rules:
- For each word or concept, provide 2-3 emoji options when multiple make sense
- For common words with an obvious emoji, still provide 2-3 related alternatives
- For abstract words with no emoji, provide 1-2 approximate conceptual alternatives
- Always return at least 1 option per word
- Skip pure punctuation words
- Return actual emoji characters, not codes`;

let prefs = {};
let favs = [];
let currentTranslation = null;

try { prefs = JSON.parse(localStorage.getItem('ej_prefs') || '{}'); } catch(e) {}
try { favs = JSON.parse(localStorage.getItem('ej_favs') || '[]'); } catch(e) {}

function savePrefs() { try { localStorage.setItem('ej_prefs', JSON.stringify(prefs)); } catch(e) {} }
function saveFavs() { try { localStorage.setItem('ej_favs', JSON.stringify(favs)); } catch(e) {} }

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
  if (name === 'favourites') renderFavs();
  if (name === 'preferences') renderPrefs();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function getEmojiString(items) { return items.map(i => i.selected).join(' '); }

async function runTranslate() {
  const input = document.getElementById('sentence-input').value.trim();
  if (!input) return;
  const btn = document.getElementById('translate-btn');
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '...';
  document.getElementById('result').style.display = 'none';

  try {
    const res = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: [{ role: 'user', content: 'Translate: "' + input + '"' }]
      })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = 'API error ' + res.status + ': ' + JSON.stringify(data);
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Go';
      return;
    }
    const textBlock = data.content && data.content.find(function(b){return b.type==='text';});
    const parsed = JSON.parse(textBlock.text);
    const items = parsed.translation.map(function(item) {
      return Object.assign({}, item, { selected: prefs[item.word.toLowerCase()] || item.options[0] });
    });
    currentTranslation = { sentence: input, items: items };
    renderResult();
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Go';
}

function renderResult() {
  if (!currentTranslation) return;
  const str = getEmojiString(currentTranslation.items);
  document.getElementById('emoji-output').textContent = str;
  document.getElementById('result').style.display = 'block';
  const isFaved = favs.find(function(f){return f.sentence===currentTranslation.sentence;});
  const favBtn = document.getElementById('fav-btn');
  favBtn.textContent = isFaved ? '★ Saved' : '☆ Save';
  favBtn.classList.toggle('active', !!isFaved);

  const grid = document.getElementById('word-grid');
  grid.innerHTML = '';
  currentTranslation.items.forEach(function(item, idx) {
    const block = document.createElement('div');
    block.className = 'word-block';
    const label = document.createElement('div');
    label.className = 'word-label';
    label.textContent = item.word;
    const opts = document.createElement('div');
    opts.className = 'emoji-opts';
    item.options.forEach(function(em) {
      const b = document.createElement('button');
      b.className = 'emoji-opt' + (item.selected === em ? ' selected' : '');
      b.textContent = em;
      b.onclick = function() { selectEmoji(idx, em); };
      opts.appendChild(b);
    });
    block.appendChild(label);
    block.appendChild(opts);
    grid.appendChild(block);
  });
}

function selectEmoji(idx, emoji) {
  currentTranslation.items[idx].selected = emoji;
  prefs[currentTranslation.items[idx].word.toLowerCase()] = emoji;
  savePrefs();
  renderResult();
}

function copyMain() {
  if (!currentTranslation) return;
  navigator.clipboard.writeText(getEmojiString(currentTranslation.items)).then(function(){
    showToast('Copied!');
  });
}

function toggleFavSentence() {
  if (!currentTranslation) return;
  const idx = favs.findIndex(function(f){return f.sentence===currentTranslation.sentence;});
  if (idx >= 0) {
    favs.splice(idx, 1);
  } else {
    favs.unshift({ sentence: currentTranslation.sentence, emoji: getEmojiString(currentTranslation.items), items: JSON.parse(JSON.stringify(currentTranslation.items)) });
  }
  saveFavs();
  renderResult();
}

function renderFavs() {
  const el = document.getElementById('fav-list');
  if (!favs.length) {
    el.innerHTML = '<div class="empty">No saved translations yet.<br>Translate something and tap ☆ Save.</div>';
    return;
  }
  el.innerHTML = '';
  favs.forEach(function(f, i) {
    const div = document.createElement('div');
    div.className = 'fav-item';
    div.innerHTML = '<div class="fav-sentence">' + escHtml(f.sentence) + '</div><div class="fav-emoji">' + f.emoji + '</div><div class="fav-item-actions"><button class="del-btn" onclick="deleteFav(' + i + ',event)">Remove</button></div>';
    div.onclick = function() { navigator.clipboard.writeText(f.emoji).then(function(){ showToast('Copied!'); }); };
    el.appendChild(div);
  });
}

function deleteFav(i, e) {
  e.stopPropagation();
  favs.splice(i, 1);
  saveFavs();
  renderFavs();
}

function renderPrefs() {
  const el = document.getElementById('pref-list');
  const keys = Object.keys(prefs);
  if (!keys.length) {
    el.innerHTML = '<div class="empty">No emoji preferences yet.<br>Select an alternative emoji for a word<br>and it will be remembered here.</div>';
    return;
  }
  el.innerHTML = '';
  keys.forEach(function(word) {
    const div = document.createElement('div');
    div.className = 'pref-item';
    div.innerHTML = '<span class="pref-word">' + escHtml(word) + '</span><div style="display:flex;align-items:center;gap:10px"><span class="pref-emoji">' + prefs[word] + '</span><button class="del-btn" onclick="deletePref(\'' + word + '\')">Remove</button></div>';
    el.appendChild(div);
  });
}

function deletePref(word) {
  delete prefs[word];
  savePrefs();
  renderPrefs();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
